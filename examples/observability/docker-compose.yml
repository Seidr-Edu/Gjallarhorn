services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki

  grafana:
    image: grafana/grafana-oss:11.1.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      loki:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  vector:
    image: timberio/vector:0.39.0-debian
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_started
    command: ["--config", "/etc/vector/vector.yaml"]
    volumes:
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro
      - /srv/pipeline/runs:/srv/pipeline/runs:ro
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro

  run-indexer:
    build:
      context: ../..
      dockerfile: examples/observability/run-indexer.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GJALLARHORN_DB_DSN: ${GJALLARHORN_DB_DSN}
    command:
      - --queue-root
      - /srv/pipeline/queue
      - --runs-root
      - /srv/pipeline/runs
      - --poll-interval-sec
      - "15"
      - --retention-days
      - "30"
    volumes:
      - /srv/pipeline/queue:/srv/pipeline/queue:ro
      - /srv/pipeline/runs:/srv/pipeline/runs:ro

volumes:
  postgres_data:
  loki_data:
  grafana_data:
